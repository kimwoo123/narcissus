<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<title>Claude JSONL 뷰어</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Apple SD Gothic Neo", sans-serif;
         display: flex; height: 100vh; color: #1f2937; }
  #sidebar { width: 340px; border-right: 1px solid #e5e7eb; display: flex;
             flex-direction: column; background: #fafafa; }
  #sidebar header { padding: 12px; border-bottom: 1px solid #e5e7eb; }
  select { width: 100%; padding: 6px; font-size: 13px; }
  #hint { font-size: 10px; color: #9ca3af; margin-top: 6px; }
  #sessions { overflow-y: auto; flex: 1; }
  .sess { padding: 10px 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px;
          border-left: 3px solid transparent; }
  .sess:hover { background: #f0f0f0; }
  .sess.open { border-left-color: #1a56db; background: #f0f6ff; }
  .sess .t { color: #6b7280; font-size: 11px; display: flex; align-items: center; gap: 6px; }
  /* 세션 ID 칩: 짧게 보이고 클릭하면 전체 UUID 복사 */
  .sid { font-family: Menlo, monospace; font-size: 10px; color: #6b7280;
         background: #eef0f3; border: 1px solid #e1e4e8; border-radius: 4px;
         padding: 1px 5px; cursor: pointer; user-select: none; }
  .sid:hover { background: #dbeafe; color: #1a56db; }
  .sid.copied { background: #d1fadf; color: #057a55; border-color: #a6f0c6; }

  /* 메인: 패널들을 세로 컬럼으로 나란히 */
  #main { flex: 1; display: flex; flex-direction: row; overflow: hidden; }
  .pane { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden;
          border-left: 1px solid #e5e7eb; }
  .pane:first-child { border-left: none; }
  .pane-title { padding: 12px 14px; font-size: 15px; font-weight: 700;
                border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 8px;
                cursor: pointer; }
  .pane.active .pane-title { background: #eff6ff; }
  .label-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pane-title:hover .label-text::after { content: " ✏️"; font-size: 12px; }
  .pane-title input { font: inherit; flex: 1; padding: 2px 6px; min-width: 0; }
  .pane-close { color: #9ca3af; font-weight: 400; font-size: 18px; line-height: 1;
                padding: 0 4px; border-radius: 4px; }
  .pane-close:hover { background: #e5e7eb; color: #ef4444; }
  .pane-conv { overflow-y: auto; padding: 16px 18px; flex: 1; }

  /* 헤더(이름+시간)를 위에, 말풍선을 그 아래에 세로로 쌓는다 */
  .msg { margin-bottom: 20px; display: flex; flex-direction: column; }
  .msg.user { align-items: flex-end; }       /* 내 메시지는 오른쪽 */
  .msg.assistant { align-items: flex-start; } /* Claude는 왼쪽 */
  /* 일반 텍스트만 말풍선 (thinking·도구는 자체 스타일 유지) */
  .msg.user .block.text { max-width: 85%; background: #eff6ff; border: 1px solid #dbeafe;
                          border-radius: 10px; padding: 8px 12px; }
  .msg.assistant .block.text { max-width: 85%; background: #ecfdf3; border: 1px solid #d1fadf;
                               border-radius: 10px; padding: 8px 12px; }
  .block.thinking, .toolgroup { align-self: stretch; }  /* thinking·도구 로그는 폭 전체 */
  /* 마크다운 렌더링된 Claude 텍스트 */
  .block.md { white-space: normal; }
  .block.md > :first-child { margin-top: 0; }
  .block.md > :last-child { margin-bottom: 0; }
  .block.md p { margin: 8px 0; }
  .block.md h1, .block.md h2, .block.md h3, .block.md h4 { margin: 12px 0 6px; line-height: 1.3; }
  .block.md ul, .block.md ol { margin: 8px 0; padding-left: 22px; }
  .block.md li { margin: 2px 0; }
  .block.md code { font-family: Menlo, monospace; font-size: 0.9em;
                   background: rgba(0,0,0,.06); padding: 1px 4px; border-radius: 4px; }
  .block.md pre { background: #1e2430; color: #e5e7eb; padding: 10px 12px;
                  border-radius: 8px; overflow-x: auto; }
  .block.md pre code { background: none; padding: 0; color: inherit; font-size: 0.85em; }
  .block.md table { border-collapse: collapse; margin: 8px 0; }
  .block.md th, .block.md td { border: 1px solid #d1d5db; padding: 4px 8px; }
  .block.md blockquote { border-left: 3px solid #d1d5db; margin: 8px 0;
                         padding-left: 10px; color: #6b7280; }
  .block.md a { color: #1a56db; }
  .role { font-weight: 700; }
  .role.user { color: #1a56db; }
  .role.assistant { color: #057a55; }
  .time { color: #9ca3af; font-size: 11px; font-weight: 400; margin-left: 8px; }
  .block { white-space: pre-wrap; word-break: break-word; margin: 6px 0; line-height: 1.5; }
  .block.thinking { color: #9ca3af; font-style: italic; }
  .toolgroup { border: 1px solid #e5d3b3; border-radius: 6px; margin: 8px 0;
               overflow: hidden; background: #fffdf7; }
  .toolgroup .tool { color: #92400e; font-family: Menlo, monospace; font-size: 12px;
                     padding: 8px 10px; white-space: pre-wrap; word-break: break-word; }
  .toolgroup .result { color: #4b5563; font-family: Menlo, monospace; font-size: 12px;
                       padding: 8px 10px; white-space: pre-wrap; word-break: break-word;
                       border-top: 1px dashed #e5d3b3; background: #f9fafb; }
  .toolgroup .reslabel { color: #9ca3af; font-size: 10px; display: block; margin-bottom: 4px; }
  .empty { color: #9ca3af; padding: 40px; text-align: center; }
</style></head>
<body>
  <div id="sidebar">
    <header>
      <div style="font-size:11px;color:#9ca3af;margin-bottom:4px">프로젝트</div>
      <select id="project"></select>
      <div id="hint">클릭: 현재 패널에서 열기 · ⌘/Ctrl+클릭: 새 패널 (최대 4)</div>
    </header>
    <div id="sessions"></div>
  </div>
  <div id="main"></div>
<script>
async function j(u){ return (await fetch(u)).json(); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function shortId(id){ return (id||'').slice(0,8); }

// 세션 ID 칩 HTML. 클릭하면 전체 ID를 복사하고 잠깐 ✓ 표시.
function sidChip(id){
  if(!id) return '';
  return `<span class="sid" title="클릭해서 세션 ID 복사: ${esc(id)}"`+
         ` onclick='copyId(event,"${esc(id)}")'>${esc(shortId(id))}</span>`;
}
async function copyId(ev, id){
  ev.stopPropagation();               // 세션 열기/라벨 편집으로 번지지 않게
  try { await navigator.clipboard.writeText(id); } catch(e) {}
  const el = ev.currentTarget;
  const orig = el.textContent;
  el.classList.add('copied'); el.textContent = '✓ 복사됨';
  setTimeout(()=>{ el.classList.remove('copied'); el.textContent = orig; }, 1000);
}

const MAX_PANES = 4;
let panes = [];      // [{id, pid, file, title, label}]
let activeId = null; // 기본 클릭의 대상이 되는 활성 패널
let curPid = null;   // 사이드바에서 선택된 프로젝트
let seq = 0;         // 패널 id 생성기

// ── 프로젝트 / 세션 목록 ─────────────────────────────────────────
async function loadProjects(){
  const projs = await j('/api/projects');
  const sel = document.getElementById('project');
  sel.innerHTML = projs.map(p=>`<option value="${esc(p.id)}">${esc(p.label)}</option>`).join('');
  sel.onchange = ()=>loadSessions(sel.value);
  if(projs.length) loadSessions(projs[0].id);
}

async function loadSessions(pid){
  curPid = pid;
  const list = await j('/api/sessions?project='+encodeURIComponent(pid));
  const box = document.getElementById('sessions');
  const openFiles = new Set(panes.filter(p=>p.pid===pid).map(p=>p.file));
  box.innerHTML = list.map(s=>{
    const open = openFiles.has(s.file) ? ' open' : '';
    return `<div class="sess${open}" onclick='onSessionClick(event,"${pid}","${s.file}")'>
       <div>${s.label?'🏷 ':''}${esc(s.label||s.title)}</div>
       <div class="t"><span>${s.mtime}</span>${sidChip(s.sessionId)}</div></div>`;
  }).join('') || '<div class="empty">세션 없음</div>';
}

// ── 패널 관리 ────────────────────────────────────────────────────
function onSessionClick(ev, pid, file){
  const wantNew = ev.metaKey || ev.ctrlKey;
  if(wantNew){
    if(panes.length >= MAX_PANES) return;  // 가득 차면 무시 (패널을 닫고 다시)
    addPane(pid, file);
  } else {
    const active = panes.find(p=>p.id===activeId);
    if(active){               // 활성 패널 교체
      active.pid = pid; active.file = file; active.title = ''; active.label = '';
      refreshPane(active, false);
    } else {                  // 열린 패널이 없으면 첫 패널 생성
      addPane(pid, file);
    }
  }
  loadSessions(curPid);       // 사이드바의 '열림' 표시 갱신
}

// 패널 하나의 뼈대 HTML. 내용은 refreshPane이 채운다.
function paneHTML(p){
  const active = p.id===activeId ? ' active' : '';
  return `<div class="pane${active}" data-pane="${p.id}" onmousedown="setActive(${p.id})">
      <div class="pane-title" onclick="editLabel(event, ${p.id})">
        <span class="label-text">로딩…</span>
        <span class="sid-slot"></span>
        <span class="pane-close" onclick="event.stopPropagation(); closePane(${p.id})">×</span>
      </div>
      <div class="pane-conv"><div class="empty">로딩…</div></div>
    </div>`;
}

function renderEmpty(){
  document.getElementById('main').innerHTML =
    '<div class="empty">왼쪽에서 세션을 고르세요. (⌘/Ctrl+클릭으로 새 패널)</div>';
}

function updateActiveClasses(){
  document.querySelectorAll('.pane').forEach(el=>
    el.classList.toggle('active', +el.dataset.pane===activeId));
}

// 기존 패널 DOM은 건드리지 않고 새 패널만 덧붙인다 (다른 패널이 초기화되지 않게).
function addPane(pid, file){
  const pane = {id: ++seq, pid, file, title: '', label: '', sid: ''};
  const main = document.getElementById('main');
  if(!panes.length) main.innerHTML = '';   // 빈 안내 제거
  panes.push(pane);
  activeId = pane.id;
  main.insertAdjacentHTML('beforeend', paneHTML(pane));
  updateActiveClasses();
  refreshPane(pane, false);
}

function closePane(id){
  panes = panes.filter(p=>p.id!==id);
  const el = document.querySelector(`.pane[data-pane="${id}"]`);
  if(el) el.remove();
  if(activeId===id) activeId = panes.length ? panes[panes.length-1].id : null;
  if(!panes.length) renderEmpty();
  updateActiveClasses();
  loadSessions(curPid);
}

function setActive(id){
  if(activeId===id) return;
  activeId = id;
  updateActiveClasses();
}

// ── 세션 내용 채우기 ─────────────────────────────────────────────
function renderMessages(messages){
  // 최신 메시지를 맨 위에 (메시지 내부 블록 순서는 그대로 유지)
  return messages.slice().reverse().map(m=>{
    const role = m.role==='user' ? '나' : 'Claude';
    const blocks = m.blocks.map(b=>{
      if(b.kind==='tool'){
        let html = `<div class="tool">${esc(b.text)}</div>`;
        if(b.result!==undefined)
          html += `<div class="result"><span class="reslabel">결과</span>${esc(b.result)}</div>`;
        return `<div class="toolgroup">${html}</div>`;
      }
      if(b.html){  // 서버가 마크다운을 안전한 HTML로 변환해 보냄 (Claude 텍스트)
        return `<div class="block ${b.kind} md">${b.html}</div>`;
      }
      return `<div class="block ${b.kind}">${esc(b.text)}</div>`;
    }).join('');
    return `<div class="msg ${m.role}">`+
           `<div class="head"><span class="role ${m.role}">${role}</span>`+
           `<span class="time">${m.time}</span></div>${blocks}</div>`;
  }).join('');
}

function setTitleText(el, pane){
  el.textContent = (pane.label || pane.title) || '(제목 없음)';
  el.title = pane.label ? 'ai-title: '+pane.title : '클릭해서 라벨 달기';
}

// keepScroll=true 면 자동 갱신: 읽던 위치를 유지하고, 맨 아래를 보고 있었으면 따라 내려간다
async function refreshPane(pane, keepScroll){
  const el = document.querySelector(`.pane[data-pane="${pane.id}"]`);
  if(!el) return;
  const data = await j('/api/session?project='+encodeURIComponent(pane.pid)+'&file='+encodeURIComponent(pane.file));
  pane.title = data.title; pane.label = data.label || ''; pane.sid = data.sessionId || '';
  const labelEl = el.querySelector('.label-text');
  if(labelEl) setTitleText(labelEl, pane);  // 편집 중이면 input이라 label-text가 없음 → 건너뜀
  const slot = el.querySelector('.sid-slot');
  if(slot) slot.innerHTML = sidChip(pane.sid);

  const conv = el.querySelector('.pane-conv');
  // 최신이 맨 위라, 새 내용은 위쪽에 추가된다.
  const atTop = conv.scrollTop <= 40;
  const prevScroll = conv.scrollTop;
  const prevHeight = conv.scrollHeight;
  if(!data.messages.length){ conv.innerHTML='<div class="empty">표시할 메시지 없음</div>'; return; }
  conv.innerHTML = renderMessages(data.messages);
  if(!keepScroll || atTop)
    conv.scrollTop = 0;   // 처음 열거나 최신을 보고 있었으면 맨 위(최신)에 고정
  else
    // 위에 새 내용이 끼어든 만큼 보정해 보던 위치를 유지
    conv.scrollTop = prevScroll + (conv.scrollHeight - prevHeight);
}

// ── 라벨 편집 (패널별) ───────────────────────────────────────────
// 제목 클릭 → 내 라벨 편집. ai-title은 건드리지 않고 별도 파일에 저장된다.
// Enter 저장 (비우면 라벨 제거 → ai-title 표시로 복귀) / Esc·포커스아웃 취소.
function editLabel(ev, id){
  const pane = panes.find(p=>p.id===id);
  const bar = ev.currentTarget;            // .pane-title
  if(!pane || bar.querySelector('input')) return;
  const labelEl = bar.querySelector('.label-text');
  const inp = document.createElement('input');
  inp.value = pane.label || '';
  inp.placeholder = pane.title;            // 원래 제목(ai-title)을 힌트로
  labelEl.replaceWith(inp);
  inp.focus(); inp.select();
  let finished = false;
  const done = async (save)=>{
    if(finished) return; finished = true;
    const v = inp.value.trim();
    if(save && v !== (pane.label || '')){
      const r = await (await fetch('/api/label', {method:'POST',
        body: JSON.stringify({project: pane.pid, file: pane.file, label: v})})).json();
      if(r.ok){
        // 같은 파일을 보는 모든 패널의 라벨을 함께 갱신
        panes.filter(p=>p.pid===pane.pid && p.file===pane.file).forEach(p=>p.label=v);
        loadSessions(curPid);              // 사이드바도 갱신
      }
    }
    const span = document.createElement('span');
    span.className = 'label-text';
    setTitleText(span, pane);
    inp.replaceWith(span);
  };
  inp.onkeydown = e=>{ if(e.key==='Enter'){ e.preventDefault(); done(true); } if(e.key==='Escape') done(false); };
  inp.onblur = ()=>done(false);
}

// ── 이벤트 기반 갱신 (SSE) ───────────────────────────────────────
// 서버의 fsnotify가 변경을 밀어준다. 연속 폭주 방지로 200ms 디바운스.
//  - created/deleted → 현재 프로젝트면 사이드바 목록 갱신
//  - modified        → 그 파일을 보고 있는 '모든' 패널을 갱신
let listTimer = null;
const paneTimers = {};
const es = new EventSource('/api/events');
es.onmessage = (e)=>{
  const ev = JSON.parse(e.data);
  if((ev.kind === 'created' || ev.kind === 'deleted') && ev.project === curPid){
    clearTimeout(listTimer);
    listTimer = setTimeout(()=>loadSessions(curPid), 200);
  }
  if(ev.kind === 'modified'){
    panes.filter(p=>p.pid===ev.project && p.file===ev.file).forEach(p=>{
      clearTimeout(paneTimers[p.id]);
      paneTimers[p.id] = setTimeout(()=>refreshPane(p, true), 200);
    });
  }
};

renderEmpty();   // 빈 상태 안내 표시
loadProjects();
</script>
</body></html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FleetBoard</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --line:#30363d; --fg:#e6edf3; --mut:#8b949e;
    --green:#3fb950; --yellow:#d29922; --red:#f85149; --blue:#58a6ff; --gray:#6e7681;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
  header { display:flex; align-items:center; gap:12px; padding:12px 18px;
    border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:5; }
  header h1 { font-size:16px; margin:0; letter-spacing:.5px; }
  header .meta { color:var(--mut); font-size:12px; }
  header .spacer { flex:1; }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); }
  main { padding:14px 18px 60px; }
  .repo { margin-bottom:22px; }
  .repo > h2 { font-size:13px; color:var(--mut); margin:0 0 8px; font-weight:600;
    text-transform:none; letter-spacing:.3px; }
  .repo > h2 b { color:var(--fg); }
  .wt { border:1px solid var(--line); border-radius:8px; margin-bottom:10px; overflow:hidden; }
  .wt-head { display:flex; align-items:center; gap:12px; padding:9px 12px;
    background:var(--panel); border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .branch { font-weight:600; color:var(--blue); }
  .git { color:var(--mut); font-size:12px; }
  .git .dirty { color:var(--yellow); } .git .clean { color:var(--green); }
  .git .ab { color:var(--blue); }
  .wt-head .spacer { flex:1; }
  .badge { font-size:12px; padding:2px 8px; border-radius:12px; border:1px solid var(--line);
    text-decoration:none; color:var(--fg); white-space:nowrap; }
  .badge:hover { border-color:var(--blue); }
  .badge.green { color:var(--green); border-color:#2ea04326; }
  .badge.yellow { color:var(--yellow); }
  .badge.red { color:var(--red); }
  .badge.gray { color:var(--gray); }
  .open-pill { font-size:11px; color:var(--green); }
  .sessions { padding:4px 12px 8px; }
  .sess { display:flex; align-items:baseline; gap:10px; padding:6px 0;
    border-top:1px dashed #21262d; }
  .sess:first-child { border-top:none; }
  .st { font-size:12px; white-space:nowrap; width:84px; }
  .st.waiting { color:var(--yellow); } .st.running { color:var(--green); } .st.idle { color:var(--gray); }
  .stitle { font-weight:600; }
  .sprompt { color:var(--mut); font-size:12px; overflow:hidden; text-overflow:ellipsis;
    white-space:nowrap; max-width:46vw; }
  .sage { color:var(--gray); font-size:11px; margin-left:auto; white-space:nowrap; }
  .empty { color:var(--mut); padding:40px; text-align:center; }
  a { color:var(--blue); }
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>FleetBoard</h1>
  <span class="meta" id="meta"></span>
  <span class="spacer"></span>
  <span class="meta" id="updated"></span>
</header>
<main id="board"><div class="empty">불러오는 중…</div></main>

<script>
const STATE = {
  waiting: {cls:'waiting', label:'✋ 입력대기'},
  running: {cls:'running', label:'⏳ 작업중'},
  idle:    {cls:'idle',    label:'💤 idle'},
};

function ago(iso) {
  if (!iso) return '';
  const s = Math.max(0, (Date.now() - new Date(iso)) / 1000);
  if (s < 60) return Math.floor(s)+'초 전';
  if (s < 3600) return Math.floor(s/60)+'분 전';
  if (s < 86400) return Math.floor(s/3600)+'시간 전';
  return Math.floor(s/86400)+'일 전';
}
const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function pipeBadge(p) {
  if (!p) return '';
  let cls='gray', icon='○';
  if (p.status !== 'completed') { cls='yellow'; icon='◐'; }
  else if (p.result === 'succeeded') { cls='green'; icon='●'; }
  else if (p.result === 'failed') { cls='red'; icon='●'; }
  else { cls='yellow'; icon='●'; }
  const num = p.number ? ' #'+esc(p.number) : '';
  const label = p.status !== 'completed' ? 'running' : (p.result||'');
  return `<a class="badge ${cls}" href="${esc(p.url)}" target="_blank" title="pipeline">${icon} ${esc(label)}${num}</a>`;
}

function gitInfo(w) {
  if (!w.isGit) return '<span class="git">—</span>';
  let parts = [];
  parts.push(w.clean ? '<span class="clean">clean</span>' : `<span class="dirty">●${w.dirty}</span>`);
  if (w.ahead) parts.push(`<span class="ab">↑${w.ahead}</span>`);
  if (w.behind) parts.push(`<span class="ab">↓${w.behind}</span>`);
  return `<span class="git">${parts.join(' ')}</span>`;
}

function render(state) {
  document.getElementById('meta').textContent =
    state.adoConfigured ? 'Azure DevOps 연결됨' : 'ADO 미설정 (ADO_ORG/ADO_PROJECT/ADO_PAT)';
  document.getElementById('updated').textContent = '갱신 ' + ago(state.generatedAt);

  const board = document.getElementById('board');
  if (!state.repos || !state.repos.length) {
    board.innerHTML = `<div class="empty">표시할 세션이 없어요.<br>
      최근 활동이 FLEETBOARD_MAX_AGE_HOURS 안에 있는지 확인하세요.</div>`;
    return;
  }
  let html = '';
  for (const repo of state.repos) {
    html += `<div class="repo"><h2><b>${esc(repo.name)}</b> <span style="color:var(--gray)">${esc(repo.path)}</span></h2>`;
    for (const w of repo.worktrees) {
      const openPill = w.open ? '<span class="open-pill">● VSCode</span>' : '';
      const pr = w.pr ? `<a class="badge blue" href="${esc(w.pr.url)}" target="_blank" title="${esc(w.pr.title)}">PR !${w.pr.id}</a>` : '';
      html += `<div class="wt">
        <div class="wt-head">
          <span class="branch">${esc(w.branch || '(no branch)')}</span>
          ${gitInfo(w)} ${openPill}
          <span class="spacer"></span>
          ${pr}
          ${pipeBadge(w.pipeline)}
          <a class="badge" href="${esc(w.vscodeUrl)}" title="open in VSCode">⧉ VSCode</a>
        </div>
        <div class="sessions">`;
      if (!w.sessions.length) {
        html += `<div class="sess"><span class="st idle">—</span><span class="sprompt">세션 없음</span></div>`;
      }
      for (const s of w.sessions) {
        const st = STATE[s.state] || STATE.idle;
        html += `<div class="sess">
          <span class="st ${st.cls}">${st.label}</span>
          <span class="stitle">${esc(s.title) || '<span style="color:var(--gray)">제목 없음</span>'}</span>
          <span class="sprompt">${esc(s.prompt)}</span>
          <span class="sage">${ago(s.lastActivity)}</span>
        </div>`;
      }
      html += `</div></div>`;
    }
    html += `</div>`;
  }
  board.innerHTML = html;
}

async function tick() {
  try {
    const r = await fetch('/api/state', {cache:'no-store'});
    render(await r.json());
  } catch (e) {
    document.getElementById('updated').textContent = '연결 끊김…';
  }
}
tick();
setInterval(tick, 5000);
</script>
</body>
</html>

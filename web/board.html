<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FleetBoard</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --line:#30363d; --fg:#e6edf3; --mut:#8b949e;
    --green:#3fb950; --yellow:#d29922; --red:#f85149; --blue:#58a6ff; --gray:#6e7681;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
  header { display:flex; align-items:center; gap:12px; padding:12px 18px;
    border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:5; }
  header h1 { font-size:16px; margin:0; letter-spacing:.5px; }
  header .meta { color:var(--mut); font-size:12px; }
  header .spacer { flex:1; }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); }
  main { padding:14px 18px 60px; }
  .repo { margin-bottom:22px; }
  .repo > h2 { font-size:13px; color:var(--mut); margin:0 0 8px; font-weight:600;
    text-transform:none; letter-spacing:.3px; }
  .repo > h2 b { color:var(--fg); }
  .wt { border:1px solid var(--line); border-radius:8px; margin-bottom:10px; overflow:hidden; }
  .wt-head { display:flex; align-items:center; gap:12px; padding:9px 12px;
    background:var(--panel); border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .branch { font-weight:600; color:var(--blue); }
  .git { color:var(--mut); font-size:12px; }
  .git .dirty { color:var(--yellow); } .git .clean { color:var(--green); }
  .git .ab { color:var(--blue); }
  .wt-head .spacer { flex:1; }
  .badge { font-size:12px; padding:2px 8px; border-radius:12px; border:1px solid var(--line);
    text-decoration:none; color:var(--fg); white-space:nowrap; }
  .badge:hover { border-color:var(--blue); }
  .badge.green { color:var(--green); border-color:#2ea04326; }
  .badge.yellow { color:var(--yellow); }
  .badge.red { color:var(--red); }
  .badge.gray { color:var(--gray); }
  .open-pill { font-size:11px; color:var(--green); }
  .sessions { padding:4px 12px 8px; }
  .sess { display:flex; align-items:baseline; gap:10px; padding:6px 0;
    border-top:1px dashed #21262d; }
  .sess:first-child { border-top:none; }
  .st { font-size:12px; white-space:nowrap; width:84px; }
  .st.waiting { color:var(--yellow); } .st.running { color:var(--green); } .st.idle { color:var(--gray); }
  .stitle { font-weight:600; }
  .stitle a { color:inherit; text-decoration:none; }
  .stitle a:hover { color:var(--blue); text-decoration:underline; }
  .sprompt { color:var(--mut); font-size:12px; overflow:hidden; text-overflow:ellipsis;
    white-space:nowrap; max-width:46vw; }
  .sage { color:var(--gray); font-size:11px; margin-left:auto; white-space:nowrap; }
  .empty { color:var(--mut); padding:40px; text-align:center; }
  .seg { display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .seg-btn { font:inherit; font-size:12px; color:var(--mut); background:transparent; border:0;
    padding:4px 12px; cursor:pointer; }
  .seg-btn + .seg-btn { border-left:1px solid var(--line); }
  .seg-btn:hover { color:var(--fg); }
  .seg-btn.on { background:var(--panel); color:var(--fg); font-weight:600; }
  .seg-count { color:var(--gray); font-weight:400; margin-left:3px; }
  a { color:var(--blue); }
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>FleetBoard</h1>
  <span class="meta" id="meta"></span>
  <span class="spacer"></span>
  <div class="seg" id="seg">
    <button class="seg-btn" data-mode="active">нҷңм„ұл§Ң</button>
    <button class="seg-btn" data-mode="all">м „мІҙ<span class="seg-count" id="idleCount"></span></button>
  </div>
  <span class="meta" id="updated"></span>
</header>
<main id="board"><div class="empty">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div></main>

<script>
const STATE = {
  waiting: {cls:'waiting', label:'вңӢ мһ…л ҘлҢҖкё°'},
  running: {cls:'running', label:'вҸі мһ‘м—…мӨ‘'},
  idle:    {cls:'idle',    label:'рҹ’Ө idle'},
};

function ago(iso) {
  if (!iso) return '';
  const s = Math.max(0, (Date.now() - new Date(iso)) / 1000);
  if (s < 60) return Math.floor(s)+'мҙҲ м „';
  if (s < 3600) return Math.floor(s/60)+'л¶„ м „';
  if (s < 86400) return Math.floor(s/3600)+'мӢңк°„ м „';
  return Math.floor(s/86400)+'мқј м „';
}
const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function pipeBadge(p) {
  if (!p) return '';
  let cls='gray', icon='в—Ӣ';
  if (p.status !== 'completed') { cls='yellow'; icon='в—җ'; }
  else if (p.result === 'succeeded') { cls='green'; icon='в—Ҹ'; }
  else if (p.result === 'failed') { cls='red'; icon='в—Ҹ'; }
  else { cls='yellow'; icon='в—Ҹ'; }
  const num = p.number ? ' #'+esc(p.number) : '';
  const label = p.status !== 'completed' ? 'running' : (p.result||'');
  return `<a class="badge ${cls}" href="${esc(p.url)}" target="_blank" title="pipeline">${icon} ${esc(label)}${num}</a>`;
}

function gitInfo(w) {
  if (!w.isGit) return '<span class="git">вҖ”</span>';
  let parts = [];
  parts.push(w.clean ? '<span class="clean">clean</span>' : `<span class="dirty">в—Ҹ${w.dirty}</span>`);
  if (w.ahead) parts.push(`<span class="ab">вҶ‘${w.ahead}</span>`);
  if (w.behind) parts.push(`<span class="ab">вҶ“${w.behind}</span>`);
  return `<span class="git">${parts.join(' ')}</span>`;
}

function render(state) {
  lastState = state;
  document.getElementById('meta').textContent =
    state.adoConfigured ? 'Azure DevOps м—°кІ°лҗЁ' : 'ADO лҜём„Өм • (ADO_ORG/ADO_PROJECT/ADO_PAT)';
  document.getElementById('updated').textContent = 'к°ұмӢ  ' + ago(state.generatedAt);

  const board = document.getElementById('board');
  const idleCount = document.getElementById('idleCount');
  if (!state.repos || !state.repos.length) {
    idleCount.textContent = '';
    board.innerHTML = `<div class="empty">н‘ңмӢңн•  м„ём…ҳмқҙ м—Ҷм–ҙмҡ”.<br>
      мөңк·ј нҷңлҸҷмқҙ FLEETBOARD_MAX_AGE_HOURS м•Ҳм—җ мһҲлҠ”м§Җ нҷ•мқён•ҳм„ёмҡ”.</div>`;
    return;
  }
  let html = '';
  let hiddenIdle = 0;
  for (const repo of state.repos) {
    let wtHtml = '';
    for (const w of repo.worktrees) {
      let sessions = w.sessions || [];
      if (!showIdle) {
        const before = sessions.length;
        sessions = sessions.filter(s => s.state !== 'idle');
        hiddenIdle += before - sessions.length;
        if (sessions.length === 0) continue; // ліҙмқј м„ём…ҳмқҙ м—Ҷмңјл©ҙ worktree мһҗмІҙлҘј мҲЁк№Җ
      }
      const openPill = w.open ? '<span class="open-pill">в—Ҹ VSCode</span>' : '';
      const pr = w.pr ? `<a class="badge blue" href="${esc(w.pr.url)}" target="_blank" title="${esc(w.pr.title)}">PR !${w.pr.id}</a>` : '';
      const merged = w.merged ? `<a class="badge green" href="${esc(w.merged.url)}" target="_blank" title="${esc(w.merged.title)}">вң“ merged !${w.merged.id}</a>` : '';
      wtHtml += `<div class="wt">
        <div class="wt-head">
          <span class="branch">${esc(w.branch || '(no branch)')}</span>
          ${gitInfo(w)} ${openPill}
          <span class="spacer"></span>
          ${merged}
          ${pr}
          ${pipeBadge(w.pipeline)}
          <a class="badge openvs" data-path="${esc(w.path)}" href="#" title="VSCode м°ҪмңјлЎң мқҙлҸҷ (мқҙлҜё м—ҙл ӨмһҲмңјл©ҙ к·ё м°Ҫ нҸ¬м»ӨмҠӨ)">в§ү VSCode</a>
        </div>
        <div class="sessions">`;
      if (!sessions.length) {
        wtHtml += `<div class="sess"><span class="st idle">вҖ”</span><span class="sprompt">м„ём…ҳ м—ҶмқҢ</span></div>`;
      }
      for (const s of sessions) {
        const st = STATE[s.state] || STATE.idle;
        // м ңлӘ© нҒҙлҰӯ вҶ’ мғҲ нғӯм—җм„ң н•ҙлӢ№ м„ём…ҳ лҢҖнҷ” л·°м–ҙ м—ҙкё° (ліҙл“ңлҠ” мјңл‘” мұ„)
        const titleInner = esc(s.title) || '<span style="color:var(--gray)">м ңлӘ© м—ҶмқҢ</span>';
        const title = (s.project && s.file)
          ? `<a href="/viewer?project=${encodeURIComponent(s.project)}&file=${encodeURIComponent(s.file)}" target="_blank" title="лҢҖнҷ” лӮҙмҡ© ліҙкё°">${titleInner}</a>`
          : titleInner;
        wtHtml += `<div class="sess">
          <span class="st ${st.cls}">${st.label}</span>
          <span class="stitle">${title}</span>
          <span class="sprompt">${esc(s.prompt)}</span>
          <span class="sage">${ago(s.lastActivity)}</span>
        </div>`;
      }
      wtHtml += `</div></div>`;
    }
    if (!wtHtml) continue; // ліҙмқј worktreeк°Җ м—Ҷмңјл©ҙ repoлҸ„ мҲЁк№Җ
    html += `<div class="repo"><h2><b>${esc(repo.name)}</b> <span style="color:var(--gray)">${esc(repo.path)}</span></h2>${wtHtml}</div>`;
  }

  idleCount.textContent = hiddenIdle ? ` (${hiddenIdle})` : '';
  if (!html) {
    board.innerHTML = `<div class="empty">нҷңм„ұ м„ём…ҳ(вңӢ мһ…л ҘлҢҖкё° В· вҸі мһ‘м—…мӨ‘)мқҙ м—Ҷм–ҙмҡ”.<br>
      idle ${hiddenIdle}к°ңк°Җ мҲЁкІЁм ё мһҲмҠөлӢҲлӢӨ вҖ” мң„ вҖңм „мІҙвҖқлҘј лҲҢлҹ¬ліҙм„ёмҡ”.</div>`;
    return;
  }
  board.innerHTML = html;
}

// нҷңм„ұ/м „мІҙ м„ёк·ёлЁјнҠё нҶ кёҖ вҖ” кё°ліёмқҖ 'нҷңм„ұл§Ң'(idle мҲЁк№Җ), м„ нғқмқҖ localStorageм—җ кё°м–ө
const SHOW_IDLE_KEY = 'fleetboard.showIdle';
let showIdle = localStorage.getItem(SHOW_IDLE_KEY) === '1';
let lastState = null;
const seg = document.getElementById('seg');
function syncSeg() {
  seg.querySelectorAll('.seg-btn').forEach(b =>
    b.classList.toggle('on', (b.dataset.mode === 'all') === showIdle));
}
seg.addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  showIdle = btn.dataset.mode === 'all';
  localStorage.setItem(SHOW_IDLE_KEY, showIdle ? '1' : '0');
  syncSeg();
  if (lastState) render(lastState); // лӢӨмқҢ нҸҙл§Ғмқ„ кё°лӢӨлҰ¬м§Җ м•Ҡкі  мҰүмӢң л°ҳмҳҒ
});
syncSeg();

// в§ү VSCode лұғм§Җ: vscode:// URL лҢҖмӢ  м„ңлІ„к°Җ `code <кІҪлЎң>`лҘј мӢӨн–ү вҶ’ мқҙлҜё м—ҙлҰ° м°Ҫмқҙл©ҙ
// к·ё м°ҪмңјлЎң нҸ¬м»ӨмҠӨ(мӣҢнҒ¬мҠӨнҺҳмқҙмҠӨ лҢҖмІҙк°Җ м•„лӢҲлқј "м„Өм • м ҖмһҘ?" н”„лЎ¬н”„нҠёк°Җ м•Ҳ лңё).
// boardлҠ” 5мҙҲл§ҲлӢӨ innerHTMLмқҙ к°ҲлҰ¬лҜҖлЎң л¶ҖлӘЁм—җ мң„мһ„ л°”мқёл”©н•ңлӢӨ.
document.getElementById('board').addEventListener('click', e => {
  const a = e.target.closest('.openvs');
  if (!a) return;
  e.preventDefault();
  fetch('/api/open?path=' + encodeURIComponent(a.dataset.path), {method:'POST'}).catch(()=>{});
});

async function tick() {
  try {
    const r = await fetch('/api/state', {cache:'no-store'});
    render(await r.json());
  } catch (e) {
    document.getElementById('updated').textContent = 'м—°кІ° лҒҠк№ҖвҖҰ';
  }
}
tick();
setInterval(tick, 5000);
</script>
</body>
</html>
